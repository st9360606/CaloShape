name: Android Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release:
    name: Build signed prod release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore release signing material
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Required GitHub Actions secret $secret_name is not configured."
              exit 1
            fi
          done
          mkdir -p keystore
          printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 -d > keystore/caloshape-release.jks
          cat > keystore/keystore.properties <<EOF
          storeFile=keystore/caloshape-release.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF
          test -s keystore/caloshape-release.jks

      - name: Run prod checks and build signed APK and AAB
        run: ./gradlew --stacktrace :app:clean :app:testProdReleaseUnitTest :app:lintProdRelease :app:assembleProdRelease :app:bundleProdRelease

      - name: Verify signatures
        shell: bash
        run: |
          set -euo pipefail
          APK=$(ls app/build/outputs/apk/prod/release/*.apk | head -n 1)
          AAB=$(ls app/build/outputs/bundle/prodRelease/*.aab | head -n 1)
          keytool -printcert -jarfile "$AAB"
          if command -v apksigner >/dev/null 2>&1; then
            apksigner verify --print-certs "$APK"
          else
            echo "::warning::apksigner was not found; APK signature verification was skipped."
          fi

      - name: Upload signed prodRelease artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: prodRelease
          path: |
            app/build/outputs/apk/prod/release/*.apk
            app/build/outputs/bundle/prodRelease/*.aab
            app/build/outputs/mapping/**/mapping.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload prodRelease test and lint reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: prodRelease-reports
          path: |
            app/build/test-results/**/*.xml
            app/build/reports/tests/**
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          if-no-files-found: warn
          retention-days: 30
