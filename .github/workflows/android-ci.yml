name: Android CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_JAVA_HOME: /usr/lib/jvm/temurin-21-jdk
      JAVA_HOME: /usr/lib/jvm/temurin-21-jdk
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify Java and Gradle
        run: |
          ./gradlew -v
          java -version

      - name: Run dev unit tests, lint, and assemble
        run: ./gradlew --stacktrace :app:testDevDebugUnitTest :app:lintDevDebug :app:assembleDevDebug

      - name: Upload devDebug APK
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: devDebug-apk
          path: app/build/outputs/apk/dev/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload test and lint reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-reports
          path: |
            app/build/test-results/**/*.xml
            app/build/reports/tests/**
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          if-no-files-found: warn
          retention-days: 30

      - name: Notify Slack
        if: ${{ always() && env.SLACK_WEBHOOK_URL != '' }}
        shell: bash
        run: |
          STATUS="${{ job.status }}"
          EVENT="${{ github.event_name }}"
          REF="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ACTOR="${{ github.actor }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            COLOR="#2eb886"
            TITLE="Build succeeded"
          else
            EMOJI=":x:"
            COLOR="#e01e5a"
            TITLE="Build failed"
          fi
          PAYLOAD=$(cat <<EOF
          {
            "attachments": [{
              "color": "${COLOR}",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${EMOJI} *${TITLE}*\\n*Repo*: ${REPO}\\n*Event*: ${EVENT} (${REF})\\n*By*: ${ACTOR}\\n*Run*: <${RUN_URL}|Open workflow>"
                }
              }]
            }]
          }
          EOF
          )
          curl -sS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
