# ===== Gradle / JVM memory =====
org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError -XX:+UseParallelGC

org.gradle.caching=true
org.gradle.parallel=true
org.gradle.workers.max=3
org.gradle.vfs.watch=true
org.gradle.configuration-cache=true
org.gradle.daemon=true

# Kotlin compiler daemon memory
kotlin.daemon.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

kotlin.code.style=official
kotlin.incremental=true

# Keep current KSP behavior unless you intentionally migrate to KSP2
ksp.useKSP2=false

android.suppressUnsupportedCompileSdk=36
android.useAndroidX=true
android.nonTransitiveRClass=true

# Avoid Gradle problems-report.html FileAlreadyExistsException on local release builds
org.gradle.problems.report=false
